<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Detail Pelajaran — English Academy Indonesia</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app-navbar"></div>
<div class="page-header">
  <div class="container">
    <h4 class="fw-bold mb-1">📝 Detail Pelajaran</h4>
    <p>&nbsp;</p>
  </div>
</div>


<div class="container pb-5" style="max-width: 800px;">
  <a href="#" onclick="history.back(); return false;" class="text-decoration-none">&larr; Kembali</a>

  <div class="card section-card mt-3">
    <h4 class="fw-bold" id="lessonTitle">Memuat...</h4>
    <div id="lessonBody" class="mt-3"></div>

    <div id="videosBlock" class="mt-4" style="display:none;">
      <h6 class="fw-bold">Video</h6>
      <div id="videosList"></div>
    </div>

    <div id="pdfsBlock" class="mt-4" style="display:none;">
      <h6 class="fw-bold">Dokumen PDF</h6>
      <div id="pdfsList"></div>
    </div>

    <button class="btn btn-secondary mt-4" id="completeBtn">Tandai Selesai</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const lessonId = params.get('lessonId');
  const moduleId = params.get('moduleId');

  (async function init() {
    const user = await requireLogin();
    if (!user) return;
    renderNavbar('lessons');

    if (!lessonId) { Swal.fire('Pelajaran tidak ditemukan', '', 'error'); return; }

    try {
      const data = await callApi('getLessonDetail', { token: getSessionToken(), lessonId });
      document.getElementById('lessonTitle').textContent = data.lesson.title;
      document.getElementById('lessonBody').innerHTML = data.lesson.bodyHtml || '<p class="text-muted">Belum ada konten teks untuk pelajaran ini.</p>';

      if (data.videos.length) {
        document.getElementById('videosBlock').style.display = 'block';
        document.getElementById('videosList').innerHTML = data.videos.map(v => `
          <div class="mb-3">
            <div class="fw-semibold small mb-1">${v.title}</div>
            <video controls class="w-100 rounded" style="max-height:400px;" src="https://drive.google.com/uc?export=download&id=${v.driveFileId}"></video>
          </div>
        `).join('');
      }

      if (data.pdfs.length) {
        document.getElementById('pdfsBlock').style.display = 'block';
        document.getElementById('pdfsList').innerHTML = data.pdfs.map(f => `
          <a class="btn btn-outline-primary btn-sm mb-2 me-2" target="_blank"
             href="https://drive.google.com/file/d/${f.driveFileId}/view">${f.title} ⤓</a>
        `).join('');
      }

      const completeBtn = document.getElementById('completeBtn');
      if (data.completed) {
        completeBtn.textContent = '✓ Sudah Selesai';
        completeBtn.disabled = true;
        completeBtn.classList.add('btn-success');
        completeBtn.classList.remove('btn-secondary');
      }

      completeBtn.addEventListener('click', async () => {
        completeBtn.disabled = true;
        try {
          await callApi('markLessonComplete', { token: getSessionToken(), lessonId, moduleId });
          completeBtn.textContent = '✓ Sudah Selesai';
          completeBtn.classList.add('btn-success');
          completeBtn.classList.remove('btn-secondary');
          Swal.fire('Mantap!', 'Progres belajar tersimpan.', 'success');
        } catch (err) {
          completeBtn.disabled = false;
          Swal.fire('Gagal', err.message, 'error');
        }
      });
    } catch (err) {
      Swal.fire('Gagal memuat pelajaran', err.message, 'error');
    }
  })();
</script>

</body>
</html>
