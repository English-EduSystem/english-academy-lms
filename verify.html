<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Verifikasi Sertifikat — English Academy Indonesia</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex align-items-center" style="min-height: 100vh; background: #f4f7fb;">

<div class="container" style="max-width: 480px;">
  <div class="card section-card text-center">
    <h5 class="fw-bold mb-3" style="color:var(--primary);">Verifikasi Sertifikat</h5>

    <div id="loadingState">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="text-muted mt-2">Memeriksa kode...</p>
    </div>

    <div id="validState" style="display:none;">
      <div class="fs-1 mb-2">✅</div>
      <h6 class="fw-bold">Sertifikat Sah</h6>
      <p class="mb-1"><strong id="certStudentName"></strong></p>
      <p class="text-muted mb-1" id="certTitle"></p>
      <p class="text-muted small" id="certDate"></p>
    </div>

    <div id="invalidState" style="display:none;">
      <div class="fs-1 mb-2">❌</div>
      <h6 class="fw-bold">Kode Tidak Ditemukan</h6>
      <p class="text-muted">Sertifikat dengan kode ini tidak ada dalam sistem kami.</p>
    </div>

    <div id="noCodeState" style="display:none;">
      <p class="text-muted">Masukkan kode verifikasi yang tertera di sertifikat:</p>
      <div class="input-group mt-2">
        <input type="text" class="form-control" id="codeInput" placeholder="Contoh: A1B2C3D4">
        <button class="btn btn-primary" id="checkBtn">Cek</button>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  (async function init() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');

    if (code) {
      await checkCode(code);
    } else {
      show('noCodeState');
      document.getElementById('checkBtn').addEventListener('click', () => {
        const value = document.getElementById('codeInput').value.trim();
        if (value) checkCode(value);
      });
    }
  })();

  async function checkCode(code) {
    show('loadingState');
    try {
      // verifyCertificateCode is a PUBLIC action — no token required.
      const result = await callApi('verifyCertificateCode', { code });
      if (result.valid) {
        document.getElementById('certStudentName').textContent = result.studentName;
        document.getElementById('certTitle').textContent = result.title;
        document.getElementById('certDate').textContent = 'Diterbitkan ' + new Date(result.issueDate).toLocaleDateString('id-ID');
        show('validState');
      } else {
        show('invalidState');
      }
    } catch (err) {
      show('invalidState');
    }
  }

  function show(id) {
    ['loadingState', 'validState', 'invalidState', 'noCodeState'].forEach(s => {
      document.getElementById(s).style.display = s === id ? 'block' : 'none';
    });
  }
</script>

</body>
</html>
