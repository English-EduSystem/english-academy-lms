<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Materi Belajar — English Academy Indonesia</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app-navbar"></div>
<div class="page-header">
  <div class="container">
    <h4 class="fw-bold mb-1">📚 Materi Belajar</h4>
    <p>Pilih mata pelajaran dan mulai belajar</p>
  </div>
</div>


<div class="container py-4 pb-5">

  <nav aria-label="breadcrumb">
    <ol class="breadcrumb" id="breadcrumb">
      <li class="breadcrumb-item active">Mata Pelajaran</li>
    </ol>
  </nav>

  <div id="subjectsView" class="row g-3"></div>
  <div id="modulesView" class="row g-3" style="display:none;"></div>
  <div id="lessonsView" class="row g-3" style="display:none;"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  let currentSubject = null;
  let currentModule = null;
  let subjectsCache = {};
  let modulesCache = {};

  (async function init() {
    const user = await requireLogin();
    if (!user) return;
    renderNavbar('lessons');
    await loadSubjects();
  })();

  async function loadSubjects() {
    setView('subjectsView');
    setBreadcrumb([{ label: 'Mata Pelajaran' }]);
    try {
      const subjects = await callApi('listSubjects', { token: getSessionToken() });
      subjects.forEach(s => { subjectsCache[s.subjectId] = s; });

      const grid = document.getElementById('subjectsView');
      grid.innerHTML = subjects.map(s => `
        <div class="col-md-4">
          <div class="card p-4 h-100 lesson-card" role="button" onclick="openSubject('${s.subjectId}')">
            <div class="fs-2 mb-2">📘</div>
            <h6 class="fw-bold">${escapeHtml(s.subjectName)}</h6>
            <div class="text-muted small">Kurikulum Merdeka</div>
          </div>
        </div>
      `).join('') || `<p class="text-muted">Belum ada mata pelajaran.</p>`;
    } catch (err) {
      Swal.fire('Gagal memuat', err.message, 'error');
    }
  }

  async function openSubject(subjectId) {
    currentSubject = subjectsCache[subjectId];
    setView('modulesView');
    setBreadcrumb([
      { label: 'Mata Pelajaran', onclick: 'loadSubjects()' },
      { label: escapeHtml(currentSubject.subjectName) }
    ]);
    try {
      const modules = await callApi('listModules', { token: getSessionToken(), subjectId });
      modules.forEach(m => { modulesCache[m.moduleId] = m; });

      const grid = document.getElementById('modulesView');
      grid.innerHTML = modules.map(m => `
        <div class="col-md-4">
          <div class="card p-4 h-100 lesson-card" role="button" onclick="openModule('${m.moduleId}')">
            <h6 class="fw-bold">${escapeHtml(m.title)}</h6>
            <p class="text-muted small mb-0">${escapeHtml(m.description || '')}</p>
          </div>
        </div>
      `).join('') || `<p class="text-muted">Belum ada modul untuk mata pelajaran ini.</p>`;
    } catch (err) {
      Swal.fire('Gagal memuat', err.message, 'error');
    }
  }

  async function openModule(moduleId) {
    currentModule = modulesCache[moduleId];
    setView('lessonsView');
    setBreadcrumb([
      { label: 'Mata Pelajaran', onclick: 'loadSubjects()' },
      { label: escapeHtml(currentSubject.subjectName), onclick: `openSubject('${currentSubject.subjectId}')` },
      { label: escapeHtml(currentModule.title) }
    ]);
    try {
      const lessons = await callApi('listLessons', { token: getSessionToken(), moduleId });
      const grid = document.getElementById('lessonsView');
      const quizLink = `
        <div class="col-12">
          <a class="btn btn-sm btn-outline-secondary mb-2" href="quiz.html?subjectId=${currentSubject.subjectId}&moduleId=${moduleId}">📝 Lihat Kuis untuk Modul Ini</a>
        </div>`;
      grid.innerHTML = quizLink + (lessons.map(l => `
        <div class="col-md-6">
          <div class="card lesson-card d-flex flex-row align-items-center gap-3" role="button"
               onclick="window.location.href='lesson-detail.html?lessonId=${l.lessonId}&moduleId=${moduleId}'">
            <div class="fs-3 me-3">${contentTypeIcon(l.contentType)}</div>
            <div>
              <div class="fw-semibold">${escapeHtml(l.title)}</div>
              <div class="text-muted small">${l.durationMinutes || 0} menit</div>
            </div>
          </div>
        </div>
      `).join('') || `<p class="text-muted">Belum ada pelajaran di modul ini.</p>`);
    } catch (err) {
      Swal.fire('Gagal memuat', err.message, 'error');
    }
  }

  function contentTypeIcon(type) {
    return { video: '🎬', pdf: '📄', text: '📝', mixed: '📚' }[type] || '📝';
  }

  function setView(viewId) {
    ['subjectsView', 'modulesView', 'lessonsView'].forEach(id => {
      document.getElementById(id).style.display = id === viewId ? 'flex' : 'none';
    });
  }

  function setBreadcrumb(items) {
    const el = document.getElementById('breadcrumb');
    el.innerHTML = items.map((item, i) => {
      const isLast = i === items.length - 1;
      return isLast
        ? `<li class="breadcrumb-item active">${item.label}</li>`
        : `<li class="breadcrumb-item"><a href="#" onclick="${item.onclick}; return false;">${item.label}</a></li>`;
    }).join('');
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }
</script>

</body>
</html>
