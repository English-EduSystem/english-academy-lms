<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sertifikat — English Academy Indonesia</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app-navbar"></div>

<div class="container pb-5" style="max-width: 800px;">
  <h5 class="fw-bold mb-1">🏆 Sertifikat Saya</h5>
  <p class="text-muted mb-4">Sertifikat diterbitkan otomatis setiap kali kamu menyelesaikan seluruh pelajaran dalam satu modul.</p>

  <div id="certList" class="row g-3"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  (async function init() {
    const user = await requireLogin();
    if (!user) return;
    renderNavbar('certificates');

    try {
      const certs = await callApi('listMyCertificates', { token: getSessionToken() });
      document.getElementById('certList').innerHTML = certs.map(c => `
        <div class="col-md-6">
          <div class="card p-3 h-100">
            <div class="fs-2 mb-2">🎓</div>
            <div class="fw-semibold">${c.title}</div>
            <div class="text-muted small mb-2">Diterbitkan ${new Date(c.issueDate).toLocaleDateString('id-ID')}</div>
            <div class="text-muted small mb-2">Kode verifikasi: <code>${c.qrVerificationCode}</code></div>
            <a class="btn btn-sm btn-primary" target="_blank" href="${c.downloadUrl}">Unduh PDF</a>
          </div>
        </div>
      `).join('') || '<p class="text-muted">Belum ada sertifikat. Selesaikan semua pelajaran dalam satu modul untuk mendapatkan sertifikat pertamamu!</p>';
    } catch (err) {
      Swal.fire('Gagal memuat', err.message, 'error');
    }
  })();
</script>

</body>
</html>
