<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tugas — English Academy Indonesia</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app-navbar"></div>
<div class="page-header">
  <div class="container">
    <h4 class="fw-bold mb-1">📋 Tugas</h4>
    <p>Daftar tugas dan status pengumpulan</p>
  </div>
</div>


<div class="container pb-5" style="max-width: 800px;">
  <h5 class="fw-bold mb-1">📝 Tugas</h5>
  <p class="text-muted mb-4">Semua tugas untuk kelasmu, dan status pengumpulannya.</p>

  <div id="assignmentsList" class="row g-3"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  (async function init() {
    const user = await requireLogin();
    if (!user) return;
    renderNavbar('lessons');
    await loadAssignments();
  })();

  async function loadAssignments() {
    try {
      const profile = await callApi('getMyProfile', { token: getSessionToken() });
      if (!profile.classId) {
        document.getElementById('assignmentsList').innerHTML = '<p class="text-muted">Kamu belum ditempatkan di kelas manapun. Hubungi admin sekolah.</p>';
        return;
      }

      const assignments = await callApi('listAssignmentsByClass', { token: getSessionToken(), classId: profile.classId });

      document.getElementById('assignmentsList').innerHTML = assignments.map(a => {
        const isPastDue = new Date(a.dueDate) < new Date();
        return `
        <div class="col-12">
          <div class="card section-card">
            <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
              <div>
                <div class="fw-semibold">${a.title}</div>
                <div class="text-muted small mb-2">Tenggat: ${new Date(a.dueDate).toLocaleString('id-ID')} ${isPastDue ? '<span class="text-danger">(lewat tenggat)</span>' : ''}</div>
                <div class="small">${a.instructions}</div>
              </div>
              <button class="btn btn-sm btn-primary" onclick="submitDialog('${a.assignmentId}')">Kumpulkan Tugas</button>
            </div>
          </div>
        </div>`;
      }).join('') || '<p class="text-muted">Belum ada tugas untuk kelasmu.</p>';
    } catch (err) {
      Swal.fire('Gagal memuat', err.message, 'error');
    }
  }

  async function submitDialog(assignmentId) {
    const { value: file } = await Swal.fire({
      title: 'Kumpulkan Tugas',
      input: 'file',
      inputAttributes: { accept: '.pdf,.jpg,.jpeg,.png,.docx' },
      showCancelButton: true, confirmButtonText: 'Unggah', cancelButtonText: 'Batal'
    });
    if (!file) return;

    Swal.fire({ title: 'Mengunggah...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });
    try {
      const base64Data = await fileToBase64(file);
      await callApi('submitAssignment', { token: getSessionToken(), assignmentId, base64Data, mimeType: file.type, fileName: file.name });
      Swal.fire('Berhasil!', 'Tugas sudah dikumpulkan.', 'success');
    } catch (err) {
      Swal.fire('Gagal mengumpulkan', err.message, 'error');
    }
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
</script>

</body>
</html>
