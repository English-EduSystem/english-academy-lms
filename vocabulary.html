<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kosakata — English Academy Indonesia</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app-navbar"></div>

<div class="container pb-5" style="max-width: 800px;">
  <h5 class="fw-bold mb-1">📖 Kosakata</h5>
  <p class="text-muted mb-4">Cari arti kata Bahasa Inggris dan simpan ke daftar kosakatamu.</p>

  <div class="card p-4 mb-4">
    <div class="input-group">
      <input type="text" class="form-control" id="wordInput" placeholder="Ketik kata Bahasa Inggris...">
      <button class="btn btn-primary" id="searchBtn">Cari</button>
    </div>

    <div id="lookupResult" class="mt-3" style="display:none;">
      <h5 class="fw-bold mb-1" id="resultWord"></h5>
      <div class="text-muted mb-2" id="resultPronunciation"></div>
      <p id="resultMeaning"></p>
      <p class="small"><strong>Sinonim:</strong> <span id="resultSynonyms">-</span></p>
      <p class="small"><strong>Antonim:</strong> <span id="resultAntonyms">-</span></p>
      <p class="small fst-italic" id="resultExample"></p>
      <button class="btn btn-sm btn-secondary" id="saveWordBtn">+ Simpan ke Kosakataku</button>
    </div>
  </div>

  <h6 class="fw-bold mb-2">Kosakataku</h6>
  <div id="vocabList" class="row g-2"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  let lastLookup = null;

  (async function init() {
    const user = await requireLogin();
    if (!user) return;
    renderNavbar('vocabulary');
    loadVocabList();
  })();

  document.getElementById('searchBtn').addEventListener('click', searchWord);
  document.getElementById('wordInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') searchWord(); });

  async function searchWord() {
    const word = document.getElementById('wordInput').value.trim();
    if (!word) return;

    try {
      const result = await callApi('lookupWord', { token: getSessionToken(), word });
      lastLookup = result;

      document.getElementById('resultWord').textContent = result.word;
      document.getElementById('resultPronunciation').textContent = result.pronunciation || '';
      document.getElementById('resultMeaning').textContent = result.meaning || '-';
      document.getElementById('resultSynonyms').textContent = result.synonyms || '-';
      document.getElementById('resultAntonyms').textContent = result.antonyms || '-';
      document.getElementById('resultExample').textContent = result.exampleSentence ? `"${result.exampleSentence}"` : '';
      document.getElementById('lookupResult').style.display = 'block';
    } catch (err) {
      Swal.fire('Kata tidak ditemukan', err.message, 'error');
    }
  }

  document.getElementById('saveWordBtn').addEventListener('click', async () => {
    if (!lastLookup) return;
    try {
      await callApi('saveVocabularyWord', { token: getSessionToken(), ...lastLookup });
      Swal.fire({ icon: 'success', title: 'Tersimpan!', timer: 1200, showConfirmButton: false });
      loadVocabList();
    } catch (err) {
      Swal.fire('Gagal menyimpan', err.message, 'error');
    }
  });

  async function loadVocabList() {
    try {
      const words = await callApi('listMyVocabulary', { token: getSessionToken() });
      document.getElementById('vocabList').innerHTML = words.map(w => `
        <div class="col-md-6">
          <div class="card p-3 h-100">
            <div class="d-flex justify-content-between">
              <strong>${w.word}</strong>
              <button class="btn btn-sm ${w.isFavorite === 'TRUE' ? 'btn-warning' : 'btn-outline-secondary'}" onclick="toggleFav('${w.vocabId}')">★</button>
            </div>
            <div class="text-muted small">${w.pronunciation || ''}</div>
            <div class="small mt-1">${w.meaning || ''}</div>
            <button class="btn btn-sm btn-link text-danger p-0 mt-2 text-start" onclick="deleteWord('${w.vocabId}')">Hapus</button>
          </div>
        </div>
      `).join('') || '<p class="text-muted">Belum ada kosakata tersimpan.</p>';
    } catch (err) { /* non-critical */ }
  }

  async function toggleFav(vocabId) {
    try {
      await callApi('toggleFavoriteVocabulary', { token: getSessionToken(), vocabId });
      loadVocabList();
    } catch (err) { Swal.fire('Gagal', err.message, 'error'); }
  }

  async function deleteWord(vocabId) {
    const confirm = await Swal.fire({ title: 'Hapus kata ini?', showCancelButton: true, confirmButtonText: 'Hapus', cancelButtonText: 'Batal' });
    if (!confirm.isConfirmed) return;
    try {
      await callApi('deleteVocabularyWord', { token: getSessionToken(), vocabId });
      loadVocabList();
    } catch (err) { Swal.fire('Gagal', err.message, 'error'); }
  }
</script>

</body>
</html>
