<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard Admin — English Academy Indonesia</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app-navbar"></div>

<div class="container pb-5">
  <h4 class="fw-bold mb-1">Dashboard Admin</h4>
  <p class="text-muted mb-4">Ringkasan sistem English Academy Indonesia.</p>

  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3"><div class="card p-3 text-center"><div class="fs-3 fw-bold text-primary" id="statStudents">-</div><div class="text-muted small">Siswa</div></div></div>
    <div class="col-6 col-md-3"><div class="card p-3 text-center"><div class="fs-3 fw-bold" style="color:var(--color-secondary);" id="statTeachers">-</div><div class="text-muted small">Guru</div></div></div>
    <div class="col-6 col-md-3"><div class="card p-3 text-center"><div class="fs-3 fw-bold text-accent" id="statClasses">-</div><div class="text-muted small">Kelas Aktif</div></div></div>
    <div class="col-6 col-md-3"><div class="card p-3 text-center"><div class="fs-3 fw-bold text-danger" id="statPending">-</div><div class="text-muted small">Menunggu Aktivasi</div></div></div>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-md-3 col-6">
      <a href="user-management.html" class="card p-3 text-center text-decoration-none h-100">
        <div class="fs-2">👥</div><div class="fw-semibold mt-1">Kelola Pengguna</div>
      </a>
    </div>
    <div class="col-md-3 col-6">
      <a href="content-manager.html" class="card p-3 text-center text-decoration-none h-100">
        <div class="fs-2">📚</div><div class="fw-semibold mt-1">Materi & Tugas</div>
      </a>
    </div>
  </div>

  <div class="card p-3">
    <h6 class="fw-bold mb-2">Aktivitas Terbaru</h6>
    <ul class="list-group list-group-flush" id="activityList"></ul>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  (async function init() {
    const user = await requireLogin();
    if (!user) return;
    renderNavbar('dashboard');

    try {
      const data = await callApi('getAdminDashboard', { token: getSessionToken() });
      document.getElementById('statStudents').textContent = data.totalStudents;
      document.getElementById('statTeachers').textContent = data.totalTeachers;
      document.getElementById('statClasses').textContent = data.totalClasses;
      document.getElementById('statPending').textContent = data.pendingActivations;

      document.getElementById('activityList').innerHTML = data.recentActivity.map(a => `
        <li class="list-group-item small d-flex justify-content-between">
          <span>${a.action} — ${a.targetType}</span>
          <span class="text-muted">${new Date(a.timestamp).toLocaleString('id-ID')}</span>
        </li>
      `).join('') || '<li class="list-group-item text-muted small">Belum ada aktivitas.</li>';
    } catch (err) {
      Swal.fire('Gagal memuat dashboard', err.message, 'error');
    }
  })();
</script>

</body>
</html>
