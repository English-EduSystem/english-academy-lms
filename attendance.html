<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kehadiran — English Academy Indonesia</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app-navbar"></div>

<div class="container pb-5">
  <h5 class="fw-bold mb-3">🗓️ Kehadiran</h5>

  <div class="d-flex gap-2 mb-3 flex-wrap">
    <select class="form-select w-auto" id="classSelect"></select>
    <input type="date" class="form-control w-auto" id="dateInput">
    <button class="btn btn-primary" id="loadBtn">Muat Data</button>
  </div>

  <div class="card p-3">
    <table class="table">
      <thead><tr><th>Siswa</th><th>Status</th></tr></thead>
      <tbody id="rosterBody"></tbody>
    </table>
    <button class="btn btn-secondary" id="saveBtn">Simpan Kehadiran</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  const STATUS_OPTIONS = [
    { value: 'present', label: 'Hadir' },
    { value: 'sick', label: 'Sakit' },
    { value: 'permitted', label: 'Izin' },
    { value: 'absent', label: 'Alpa' }
  ];

  (async function init() {
    const user = await requireLogin();
    if (!user) return;
    renderNavbar('attendance');

    const classes = await callApi('listClasses', { token: getSessionToken() });
    document.getElementById('classSelect').innerHTML = classes.map(c => `<option value="${c.classId}">${c.className}</option>`).join('');
    document.getElementById('dateInput').value = new Date().toISOString().slice(0, 10);

    document.getElementById('loadBtn').addEventListener('click', loadRoster);
    document.getElementById('saveBtn').addEventListener('click', saveAttendance);

    if (classes.length) loadRoster();
  })();

  async function loadRoster() {
    const classId = document.getElementById('classSelect').value;
    const sessionDate = document.getElementById('dateInput').value;
    if (!classId || !sessionDate) return;

    const [roster, existing] = await Promise.all([
      callApi('listStudentsByClass', { token: getSessionToken(), classId }),
      callApi('getAttendanceByDate', { token: getSessionToken(), classId, sessionDate })
    ]);
    const existingByStudent = {};
    existing.forEach(e => { existingByStudent[e.studentId] = e.status; });

    document.getElementById('rosterBody').innerHTML = roster.map(s => `
      <tr>
        <td>${s.fullName}</td>
        <td>
          <select class="form-select form-select-sm" data-student="${s.studentId}">
            ${STATUS_OPTIONS.map(o => `<option value="${o.value}" ${existingByStudent[s.studentId] === o.value ? 'selected' : ''}>${o.label}</option>`).join('')}
          </select>
        </td>
      </tr>
    `).join('') || '<tr><td colspan="2" class="text-muted">Belum ada siswa di kelas ini.</td></tr>';
  }

  async function saveAttendance() {
    const classId = document.getElementById('classSelect').value;
    const sessionDate = document.getElementById('dateInput').value;
    const records = Array.from(document.querySelectorAll('[data-student]')).map(el => ({
      studentId: el.dataset.student, status: el.value
    }));
    if (!records.length) return;

    try {
      await callApi('recordAttendance', { token: getSessionToken(), classId, sessionDate, records });
      Swal.fire({ icon: 'success', title: 'Kehadiran tersimpan', timer: 1200, showConfirmButton: false });
    } catch (err) {
      Swal.fire('Gagal menyimpan', err.message, 'error');
    }
  }
</script>

</body>
</html>
