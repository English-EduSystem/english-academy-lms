<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kelola Pengguna — English Academy Indonesia</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app-navbar"></div>

<div class="container pb-5">
  <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <h5 class="fw-bold mb-0">👥 Kelola Pengguna</h5>
    <button class="btn btn-primary" id="newUserBtn">+ Tambah Guru/Admin</button>
  </div>

  <!-- Pending student activation -->
  <div class="card p-3 mb-4" id="pendingCard" style="display:none;">
    <h6 class="fw-bold mb-2">⏳ Siswa Menunggu Aktivasi</h6>
    <div id="pendingList"></div>
  </div>

  <div class="d-flex gap-2 mb-3 flex-wrap">
    <select class="form-select w-auto" id="roleFilter">
      <option value="">Semua Peran</option>
      <option value="student">Siswa</option>
      <option value="teacher">Guru</option>
      <option value="admin">Admin</option>
    </select>
    <input type="text" class="form-control w-auto" id="searchInput" placeholder="Cari nama/email...">
    <button class="btn btn-outline-secondary" id="searchBtn">Cari</button>
  </div>

  <div class="card p-3">
    <table class="table align-middle">
      <thead><tr><th>Nama</th><th>Email</th><th>Peran</th><th>Status</th><th>Aksi</th></tr></thead>
      <tbody id="usersBody"></tbody>
    </table>
    <div class="d-flex justify-content-between align-items-center">
      <span class="text-muted small" id="pageInfo"></span>
      <div>
        <button class="btn btn-sm btn-outline-secondary" id="prevBtn">&laquo; Sebelumnya</button>
        <button class="btn btn-sm btn-outline-secondary" id="nextBtn">Berikutnya &raquo;</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  let currentPage = 1;
  const PAGE_SIZE = 20;
  let classesCache = [];

  (async function init() {
    const user = await requireLogin();
    if (!user) return;
    renderNavbar('user-management');

    classesCache = await callApi('listClasses', { token: getSessionToken() });

    document.getElementById('newUserBtn').addEventListener('click', createUserDialog);
    document.getElementById('searchBtn').addEventListener('click', () => { currentPage = 1; loadUsers(); });
    document.getElementById('roleFilter').addEventListener('change', () => { currentPage = 1; loadUsers(); });
    document.getElementById('prevBtn').addEventListener('click', () => { if (currentPage > 1) { currentPage--; loadUsers(); } });
    document.getElementById('nextBtn').addEventListener('click', () => { currentPage++; loadUsers(); });

    loadPendingStudents();
    loadUsers();
  })();

  async function loadPendingStudents() {
    const result = await callApi('listUnassignedStudents', { token: getSessionToken() });
    if (!result.length) return;

    document.getElementById('pendingCard').style.display = 'block';
    document.getElementById('pendingList').innerHTML = result.map(s => `
      <div class="d-flex justify-content-between align-items-center border-top py-2 flex-wrap gap-2">
        <div>${s.fullName} <span class="text-muted small">${s.email}</span></div>
        <div class="d-flex gap-2">
          <select class="form-select form-select-sm w-auto" id="classFor-${s.studentId}">
            ${classesCache.map(c => `<option value="${c.classId}">${c.className}</option>`).join('')}
          </select>
          <button class="btn btn-sm btn-success" onclick="activateStudent('${s.studentId}')">Aktifkan</button>
        </div>
      </div>
    `).join('');
  }

  async function activateStudent(studentId) {
    const classId = document.getElementById('classFor-' + studentId).value;
    try {
      await callApi('assignStudentToClass', { token: getSessionToken(), studentId, classId });
      Swal.fire({ icon: 'success', title: 'Siswa diaktifkan', timer: 1200, showConfirmButton: false });
      loadPendingStudents();
      loadUsers();
    } catch (err) {
      Swal.fire('Gagal mengaktifkan', err.message, 'error');
    }
  }

  async function createUserDialog() {
    const { value } = await Swal.fire({
      title: 'Tambah Guru / Admin',
      html: `
        <input id="swName" class="swal2-input" placeholder="Nama lengkap">
        <input id="swEmail" type="email" class="swal2-input" placeholder="Email">
        <input id="swPassword" type="password" class="swal2-input" placeholder="Password sementara (min. 8 karakter)">
        <select id="swRole" class="swal2-select form-select">
          <option value="teacher">Guru</option>
          <option value="admin">Admin</option>
        </select>`,
      showCancelButton: true, confirmButtonText: 'Buat Akun', cancelButtonText: 'Batal',
      preConfirm: () => ({
        fullName: document.getElementById('swName').value,
        email: document.getElementById('swEmail').value,
        password: document.getElementById('swPassword').value,
        role: document.getElementById('swRole').value
      })
    });
    if (!value || !value.fullName) return;

    try {
      await callApi('createUserByAdmin', { token: getSessionToken(), ...value });
      Swal.fire('Akun dibuat!', '', 'success');
      loadUsers();
    } catch (err) {
      Swal.fire('Gagal membuat akun', err.message, 'error');
    }
  }

  let usersCache = {};

  async function loadUsers() {
    const role = document.getElementById('roleFilter').value;
    const search = document.getElementById('searchInput').value;

    const result = await callApi('listUsers', { token: getSessionToken(), role, search, page: currentPage, pageSize: PAGE_SIZE });
    result.items.forEach(u => { usersCache[u.userId] = u; });

    document.getElementById('usersBody').innerHTML = result.items.map(u => `
      <tr>
        <td>${u.fullName}</td>
        <td>${u.email}</td>
        <td><span class="badge bg-light text-dark border">${u.role}</span></td>
        <td><span class="badge ${statusBadge(u.status)}">${u.status}</span></td>
        <td class="d-flex gap-1">
          <button class="btn btn-sm btn-outline-secondary" onclick="editUserDialog('${u.userId}')">Edit</button>
          ${u.status === 'suspended'
            ? `<button class="btn btn-sm btn-outline-success" onclick="toggleStatus('${u.userId}', 'activate')">Aktifkan</button>`
            : `<button class="btn btn-sm btn-outline-warning" onclick="toggleStatus('${u.userId}', 'suspend')">Suspend</button>`}
          <button class="btn btn-sm btn-outline-danger" onclick="removeUser('${u.userId}')">Hapus</button>
        </td>
      </tr>
    `).join('') || '<tr><td colspan="5" class="text-muted">Tidak ada pengguna ditemukan.</td></tr>';

    document.getElementById('pageInfo').textContent = `Halaman ${result.page} — ${result.total} pengguna`;
  }

  function statusBadge(status) {
    return { active: 'bg-success', pending: 'bg-warning text-dark', suspended: 'bg-secondary' }[status] || 'bg-light text-dark';
  }

  async function toggleStatus(userId, action) {
    const apiAction = action === 'activate' ? 'activateUserAccount' : 'suspendUser';
    try {
      await callApi(apiAction, { token: getSessionToken(), userId });
      loadUsers();
    } catch (err) {
      Swal.fire('Gagal', err.message, 'error');
    }
  }

  async function editUserDialog(userId) {
    const user = usersCache[userId];
    if (!user) return;

    const { value } = await Swal.fire({
      title: 'Edit Pengguna',
      html: `
        <input id="swName" class="swal2-input" placeholder="Nama lengkap">
        <input id="swPhone" class="swal2-input" placeholder="No. HP">`,
      showCancelButton: true, confirmButtonText: 'Simpan', cancelButtonText: 'Batal',
      didOpen: () => {
        document.getElementById('swName').value = user.fullName;
        document.getElementById('swPhone').value = user.phone || '';
      },
      preConfirm: () => ({
        fullName: document.getElementById('swName').value,
        phone: document.getElementById('swPhone').value
      })
    });
    if (!value || !value.fullName) return;

    try {
      await callApi('updateUserByAdmin', { token: getSessionToken(), userId, ...value });
      loadUsers();
    } catch (err) {
      Swal.fire('Gagal menyimpan', err.message, 'error');
    }
  }

  async function removeUser(userId) {
    const confirm = await Swal.fire({ title: 'Hapus akun ini secara permanen?', text: 'Tindakan ini tidak bisa dibatalkan.', icon: 'warning', showCancelButton: true, confirmButtonText: 'Hapus', cancelButtonText: 'Batal' });
    if (!confirm.isConfirmed) return;
    try {
      await callApi('deleteUser', { token: getSessionToken(), userId });
      loadUsers();
    } catch (err) {
      Swal.fire('Gagal menghapus', err.message, 'error');
    }
  }
</script>

</body>
</html>
