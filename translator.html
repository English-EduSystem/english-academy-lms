<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Translator — English Academy Indonesia</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app-navbar"></div>

<div class="container pb-5" style="max-width: 800px;">
  <h5 class="fw-bold mb-1">🌐 Translator</h5>
  <p class="text-muted mb-4">Terjemahkan paragraf antara Bahasa Inggris dan Bahasa Indonesia.</p>

  <div class="card p-4">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <span class="fw-semibold" id="sourceLangLabel">English</span>
      <button class="btn btn-sm btn-outline-secondary" id="swapBtn">⇄ Tukar Bahasa</button>
      <span class="fw-semibold" id="targetLangLabel">Bahasa Indonesia</span>
    </div>
    <div class="row g-3">
      <div class="col-md-6">
        <textarea class="form-control" id="sourceText" rows="8" placeholder="Tulis atau tempel teks di sini... (maks. 5000 karakter)"></textarea>
      </div>
      <div class="col-md-6">
        <textarea class="form-control" id="targetText" rows="8" readonly placeholder="Hasil terjemahan akan muncul di sini..."></textarea>
      </div>
    </div>
    <button class="btn btn-primary mt-3" id="translateBtn">Terjemahkan</button>
  </div>

  <h6 class="fw-bold mt-4 mb-2">Riwayat Terjemahan</h6>
  <div id="historyList"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  let sourceLang = 'en';
  let targetLang = 'id';

  (async function init() {
    const user = await requireLogin();
    if (!user) return;
    renderNavbar('translator');
    loadHistory();
  })();

  document.getElementById('swapBtn').addEventListener('click', () => {
    [sourceLang, targetLang] = [targetLang, sourceLang];
    document.getElementById('sourceLangLabel').textContent = sourceLang === 'en' ? 'English' : 'Bahasa Indonesia';
    document.getElementById('targetLangLabel').textContent = targetLang === 'en' ? 'English' : 'Bahasa Indonesia';
    const tmp = document.getElementById('sourceText').value;
    document.getElementById('sourceText').value = document.getElementById('targetText').value;
    document.getElementById('targetText').value = tmp;
  });

  document.getElementById('translateBtn').addEventListener('click', async () => {
    const text = document.getElementById('sourceText').value.trim();
    if (!text) return;
    const btn = document.getElementById('translateBtn');
    btn.disabled = true; btn.textContent = 'Menerjemahkan...';

    try {
      const { translatedText } = await callApi('translateText', { token: getSessionToken(), text, sourceLang, targetLang });
      document.getElementById('targetText').value = translatedText;
      loadHistory();
    } catch (err) {
      Swal.fire('Gagal menerjemahkan', err.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Terjemahkan';
    }
  });

  async function loadHistory() {
    try {
      const history = await callApi('listTranslationHistory', { token: getSessionToken() });
      document.getElementById('historyList').innerHTML = history.slice(0, 10).map(h => `
        <div class="card p-2 small mb-2">
          <div class="text-muted">${new Date(h.createdAt).toLocaleString('id-ID')} (${h.sourceLang.toUpperCase()})</div>
          <div>${h.sourceText.slice(0, 100)}${h.sourceText.length > 100 ? '...' : ''}</div>
        </div>
      `).join('') || '<p class="text-muted small">Belum ada riwayat.</p>';
    } catch (err) { /* non-critical */ }
  }
</script>

</body>
</html>
