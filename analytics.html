<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Analitik — English Academy Indonesia</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app-navbar"></div>

<div class="container pb-5">
  <h5 class="fw-bold mb-3">📊 Analitik</h5>

  <div class="row g-3">
    <div class="col-md-6">
      <div class="card p-3">
        <h6 class="fw-bold">Rata-rata Nilai per Mata Pelajaran</h6>
        <canvas id="scoreChart" height="220"></canvas>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card p-3">
        <h6 class="fw-bold">Jumlah Siswa per Tingkat</h6>
        <canvas id="gradeChart" height="220"></canvas>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  (async function init() {
    const user = await requireLogin();
    if (!user) return;
    renderNavbar('analytics');

    try {
      const data = await callApi('getAnalyticsOverview', { token: getSessionToken() });

      new Chart(document.getElementById('scoreChart'), {
        type: 'bar',
        data: {
          labels: data.avgScoreBySubject.map(s => s.subjectName),
          datasets: [{ label: 'Rata-rata Nilai', data: data.avgScoreBySubject.map(s => s.averageScore), backgroundColor: '#00AEEF' }]
        },
        options: { scales: { y: { beginAtZero: true, max: 100 } } }
      });

      new Chart(document.getElementById('gradeChart'), {
        type: 'doughnut',
        data: {
          labels: data.studentsByGrade.map(g => g.grade),
          datasets: [{ data: data.studentsByGrade.map(g => g.count), backgroundColor: ['#00AEEF', '#4CAF50', '#FFC107', '#ccc'] }]
        }
      });
    } catch (err) {
      Swal.fire('Gagal memuat analitik', err.message, 'error');
    }
  })();
</script>

</body>
</html>
