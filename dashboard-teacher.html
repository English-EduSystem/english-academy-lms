<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard Guru — English Academy Indonesia</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app-navbar"></div>
<div class="page-header">
  <div class="container">
    <h4 class="fw-bold mb-1">👨‍🏫 Dashboard Guru</h4>
    <p>&nbsp;</p>
  </div>
</div>


<div class="container py-4 pb-5">
  <h4 class="fw-bold mb-1">Halo, <span id="teacherName"></span> 👋</h4>
  <p class="text-muted mb-4">Berikut ringkasan kelas yang Anda ampu.</p>

  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="card stat-card blue"><div class="stat-icon blue">📊</div><div class="stat-value text-primary" id="statClasses">-</div><div class="stat-label">Kelas Diampu</div></div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card stat-card green"><div class="stat-icon green">👥</div><div class="stat-value" style="color:var(--secondary);" id="statStudents">-</div><div class="stat-label">Total Siswa</div></div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card stat-card amber"><div class="stat-icon amber">📋</div><div class="stat-value text-accent" id="statSubmissions">-</div><div class="stat-label">Tugas Belum Dinilai</div></div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card stat-card red"><div class="stat-icon red">🔴</div><div class="stat-value" style="color:var(--danger);" id="statEssays">-</div><div class="stat-label">Esai Kuis Belum Dinilai</div></div>
    </div>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-md-4 col-6">
      <a href="content-manager.html" class="card lesson-card text-center"><span class="card-icon">📚</span><div class="card-title">Materi & Tugas</div></a>
    </div>
    <div class="col-md-4 col-6">
      <a href="gradebook.html" class="card lesson-card text-center"><span class="card-icon">✅</span><div class="card-title">Penilaian</div></a>
    </div>
    <div class="col-md-4 col-6">
      <a href="attendance.html" class="card lesson-card text-center"><span class="card-icon">🗓️</span><div class="card-title">Kehadiran</div></a>
    </div>
  </div>

  <div class="section-title">Kelas Saya</div>
  <div id="myClassesList" class="row g-2"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  (async function init() {
    const user = await requireLogin();
    if (!user) return;
    renderNavbar('dashboard');
    document.getElementById('teacherName').textContent = user.fullName;

    try {
      const data = await callApi('getTeacherDashboard', { token: getSessionToken() });
      document.getElementById('statClasses').textContent = data.classCount;
      document.getElementById('statStudents').textContent = data.totalStudents;
      document.getElementById('statSubmissions').textContent = data.pendingSubmissions;
      document.getElementById('statEssays').textContent = data.pendingQuizEssays;

      document.getElementById('myClassesList').innerHTML = data.myClasses.map(c => `
        <div class="col-md-4">
          <div class="card section-card">
            <div class="fw-semibold">${c.className}</div>
            <div class="text-muted small">${c.academicYear}</div>
          </div>
        </div>
      `).join('') || '<p class="text-muted">Anda belum menjadi wali kelas manapun.</p>';
    } catch (err) {
      Swal.fire('Gagal memuat dashboard', err.message, 'error');
    }
  })();
</script>

</body>
</html>
