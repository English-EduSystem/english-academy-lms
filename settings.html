<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pengaturan Sistem — English Academy Indonesia</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app-navbar"></div>
<div class="page-header">
  <div class="container">
    <h4 class="fw-bold mb-1">⚙️ Pengaturan Sistem</h4>
    <p>Konfigurasi nama sekolah dan informasi aplikasi</p>
  </div>
</div>


<div class="container pb-5" style="max-width: 600px;">
  <h5 class="fw-bold mb-3">⚙️ Pengaturan Sistem</h5>

  <div class="card section-card">
    <div class="mb-3">
      <label class="form-label small fw-semibold">Nama Sekolah</label>
      <input type="text" class="form-control" id="settingSchoolName" placeholder="mis. SMA Negeri 1 Pelabuhanratu">
    </div>
    <div class="mb-3">
      <label class="form-label small fw-semibold">Tahun Ajaran Aktif</label>
      <input type="text" class="form-control" id="settingAcademicYear" placeholder="mis. 2026/2027">
    </div>
    <div class="mb-3">
      <label class="form-label small fw-semibold">Kontak Admin</label>
      <input type="text" class="form-control" id="settingAdminContact" placeholder="mis. admin@sekolah.sch.id">
    </div>
    <div class="mb-3">
      <label class="form-label small fw-semibold">URL Aplikasi (GitHub Pages)</label>
      <input type="text" class="form-control" id="settingFrontendUrl" placeholder="mis. https://username.github.io/english-academy">
      <div class="form-text">Digunakan di link email reset password siswa.</div>
    </div>
    <button class="btn btn-primary" id="saveBtn">Simpan Pengaturan</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  const FIELD_MAP = {
    schoolName:    'settingSchoolName',
    academicYear:  'settingAcademicYear',
    adminContact:  'settingAdminContact',
    frontendUrl:   'settingFrontendUrl'
  };

  (async function init() {
    const user = await requireLogin();
    if (!user) return;
    renderNavbar('settings');

    try {
      const settings = await callApi('getSettings', { token: getSessionToken() });
      Object.keys(FIELD_MAP).forEach(key => {
        if (settings[key]) document.getElementById(FIELD_MAP[key]).value = settings[key];
      });
    } catch (err) {
      Swal.fire('Gagal memuat pengaturan', err.message, 'error');
    }

    document.getElementById('saveBtn').addEventListener('click', async () => {
      try {
        for (const key of Object.keys(FIELD_MAP)) {
          const value = document.getElementById(FIELD_MAP[key]).value;
          await callApi('updateSetting', { token: getSessionToken(), settingKey: key, settingValue: value });
        }
        Swal.fire({ icon: 'success', title: 'Pengaturan tersimpan', timer: 1200, showConfirmButton: false });
      } catch (err) {
        Swal.fire('Gagal menyimpan', err.message, 'error');
      }
    });
  })();
</script>

</body>
</html>
