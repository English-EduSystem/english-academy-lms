<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>English Academy Indonesia — Masuk</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html" style="color: var(--color-primary);">
      English Academy <span class="text-accent">Indonesia</span>
    </a>
  </div>
</nav>

<div class="container">
  <div class="card auth-card p-4">
    <div class="card-body">

      <!-- ============ FORM LOGIN ============ -->
      <div id="loginPanel">
        <h4 class="fw-bold mb-1">Masuk</h4>
        <p class="text-muted mb-4">Belajar Bahasa Inggris untuk SMA, Kurikulum Merdeka.</p>

        <form id="loginForm">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="loginEmail" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="loginPassword" required>
          </div>
          <div id="loginError" class="text-danger small mb-3" style="display:none;"></div>
          <button type="submit" class="btn btn-primary w-100" id="loginSubmitBtn">Masuk</button>
        </form>

        <div id="googleLoginBlock" style="display:none;">
          <div class="text-center text-muted small my-3">atau</div>
          <div id="googleSignInButton" class="d-flex justify-content-center"></div>
        </div>

        <p class="text-center mt-3 mb-0">
          Belum punya akun?
          <a href="#" id="showRegister">Daftar di sini</a>
        </p>
      </div>

      <!-- ============ FORM REGISTRASI ============ -->
      <div id="registerPanel" style="display:none;">
        <h4 class="fw-bold mb-1">Daftar Akun Siswa</h4>
        <p class="text-muted mb-4">Akun akan aktif setelah dikonfirmasi admin/guru.</p>

        <form id="registerForm">
          <div class="mb-3">
            <label class="form-label">Nama Lengkap</label>
            <input type="text" class="form-control" id="regFullName" required>
          </div>
          <div class="mb-3">
            <label class="form-label">NISN</label>
            <input type="text" class="form-control" id="regNisn" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="regEmail" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password (min. 8 karakter)</label>
            <input type="password" class="form-control" id="regPassword" minlength="8" required>
          </div>
          <div id="registerError" class="text-danger small mb-3" style="display:none;"></div>
          <div id="registerSuccess" class="text-success small mb-3" style="display:none;"></div>
          <button type="submit" class="btn btn-secondary w-100" id="registerSubmitBtn">Daftar</button>
        </form>

        <p class="text-center mt-3 mb-0">
          Sudah punya akun?
          <a href="#" id="showLogin">Masuk di sini</a>
        </p>
      </div>

    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
  // ---- tombol "Masuk dengan Google" (opsional, lihat js/api.js) ----
  if (GOOGLE_OAUTH_CLIENT_ID) {
    document.getElementById('googleLoginBlock').style.display = 'block';
    window.onload = () => {
      google.accounts.id.initialize({ client_id: GOOGLE_OAUTH_CLIENT_ID, callback: handleGoogleCredential });
      google.accounts.id.renderButton(document.getElementById('googleSignInButton'), { theme: 'outline', size: 'large', width: 280 });
    };
  }

  async function handleGoogleCredential(response) {
    try {
      const data = await callApi('loginWithGoogle', { idToken: response.credential });
      saveSession(data.sessionToken, data.user);
      goToDashboard(data.user.role);
    } catch (err) {
      document.getElementById('loginError').textContent = err.message;
      document.getElementById('loginError').style.display = 'block';
    }
  }

  // ---- toggle antara panel login dan registrasi ----
  document.getElementById('showRegister').addEventListener('click', (e) => {
    e.preventDefault();
    document.getElementById('loginPanel').style.display = 'none';
    document.getElementById('registerPanel').style.display = 'block';
  });
  document.getElementById('showLogin').addEventListener('click', (e) => {
    e.preventDefault();
    document.getElementById('registerPanel').style.display = 'none';
    document.getElementById('loginPanel').style.display = 'block';
  });

  // ---- jika sudah login, langsung arahkan ke dashboard sesuai role ----
  (function redirectIfLoggedIn() {
    const user = getCurrentUser();
    if (user) goToDashboard(user.role);
  })();

  function goToDashboard(role) {
    const map = {
      student: 'dashboard-student.html',
      teacher: 'dashboard-teacher.html',
      admin: 'dashboard-admin.html'
    };
    window.location.href = map[role] || 'index.html';
  }

  // ---- submit login ----
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('loginError');
    const btn = document.getElementById('loginSubmitBtn');
    errEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Memproses...';

    try {
      const data = await callApi('login', {
        email: document.getElementById('loginEmail').value.trim(),
        password: document.getElementById('loginPassword').value
      });
      saveSession(data.sessionToken, data.user);
      goToDashboard(data.user.role);
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Masuk';
    }
  });

  // ---- submit registrasi ----
  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('registerError');
    const okEl = document.getElementById('registerSuccess');
    const btn = document.getElementById('registerSubmitBtn');
    errEl.style.display = 'none';
    okEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Memproses...';

    try {
      const data = await callApi('registerStudent', {
        fullName: document.getElementById('regFullName').value.trim(),
        nisn: document.getElementById('regNisn').value.trim(),
        email: document.getElementById('regEmail').value.trim(),
        password: document.getElementById('regPassword').value
      });
      okEl.textContent = data.message;
      okEl.style.display = 'block';
      document.getElementById('registerForm').reset();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Daftar';
    }
  });
</script>

</body>
</html>
